# JitPack build configuration.
#
# JitPack's default install command (`./gradlew install`) doesn't work for
# this repo because:
#
#   1. The runtime AAR has a CMake/NDK build step that needs the Android
#      SDK + NDK 27.0.12077973 + CMake 3.22.1, none of which JitPack's
#      base image ships with.
#
#   2. There are two publishable modules: the runtime AAR (`:deviceintelligence`)
#      and the Gradle plugin (under `deviceintelligence-gradle/`). We invoke
#      each publish in turn so both land in `~/.m2/repository/$GROUP_PATH/...`.
#
# Important: run the SDK bootstrap in ONE shell block so `export PATH` and
# other env vars persist for `sdkmanager`. Some CI runners treat each YAML
# list item as a separate subshell; split `export` + `sdkmanager` lines then
# fail with "sdkmanager: not found" and JitPack only shows a terse
# "Error building" in the UI — open the full build log for the real stderr.
#
# JitPack maps the git tag to Gradle `VERSION_NAME` for tag builds; local
# `gradle.properties` is the fallback for non-tag builds.

jdk:
  - openjdk21

before_install:
  - |
    set -euo pipefail
    export ANDROID_SDK_ROOT="$HOME/android-sdk"
    export ANDROID_HOME="$ANDROID_SDK_ROOT"
    mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    curl -sSLo /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    unzip -qo /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
    mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    chmod +x ./gradlew
    yes | sdkmanager --licenses
    sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

install:
  - |
    set -euo pipefail
    export ANDROID_SDK_ROOT="$HOME/android-sdk"
    export ANDROID_HOME="$ANDROID_SDK_ROOT"
    export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    chmod +x ./gradlew
    ./gradlew :deviceintelligence:publishToMavenLocal --no-daemon -x test
    ./gradlew -p deviceintelligence-gradle publishToMavenLocal --no-daemon -x test
