org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# ---------------------------------------------------------------------------
# Publication coordinates — single source of truth.
#
# JitPack rewrites VERSION_NAME on tag builds to the git tag itself
# (e.g. `0.4.0` from a `0.4.0` tag). Local + non-tag builds keep the
# value below so `publishToMavenLocal` works for smoke-testing.
#
# GROUP_ID matches the JitPack default for this org / repo. Keep in sync
# with the JitPack `com.github.<user>.<repo>` convention.
#
# These three values feed:
#   - both modules' Maven publication coordinates (group / version)
#   - the AAR's BuildConfig.LIBRARY_VERSION (read at runtime by
#     TelemetryReport.libraryVersion)
#   - the plugin's generated PluginVersion.kt constant (read at build
#     time and baked into every consumer's fingerprint.bin)
#   - the plugin's auto-applied runtime dependency on the AAR — the
#     plugin pulls the same VERSION_NAME of the AAR it was published
#     alongside, eliminating plugin-vs-runtime version skew.
# ---------------------------------------------------------------------------
GROUP_ID=com.github.iamjosephmj.DeviceIntelligence
VERSION_NAME=0.6.0
LIBRARY_ARTIFACT_ID=deviceintelligence
PLUGIN_ARTIFACT_ID=deviceintelligence-gradle
